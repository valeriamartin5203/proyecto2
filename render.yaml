# render.yaml - Configuración para desplegar backend y frontend juntos

services:
  # ===== BACKEND (Web Service) =====
  - type: web
    name: backend-reportes
    runtime: node
    repo: https://github.com/valeriamartin5203/proyecto2.git
    branch: main
    rootDir: backend  # ← ¡CLAVE! Indica que está en subcarpeta
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 18.18.0
      - key: GEMINI_API_KEY
        sync: false  # La configurarás manualmente en el dashboard

  # ===== FRONTEND (Static Site) =====
  - type: static
    name: frontend-reportes
    repo: https://github.com/TU_USUARIO/TU_REPOSITORIO.git
    branch: main
    rootDir: frontend  # ← ¡CLAVE! Indica que está en subcarpeta
    buildCommand: npm run build
    publishPath: dist  # Para Vite (si usas Create React App sería 'build')
    envVars:
      - key: VITE_API_URL
        value: https://backend-reportes.onrender.com  # URL del backend